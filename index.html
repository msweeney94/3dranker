<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DRanker — Best 3D Printers Ranked 2026</title>
<style>
:root {
  --bg: #0f0e0d;
  --bg2: #1a1714;
  --bg3: #242220;
  --t1: #e8dfd5;
  --t2: #b8aca0;
  --t3: #7a6f63;
  --border: #3a3530;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
}
html.light {
  --bg: #faf8f5;
  --bg2: #fff;
  --bg3: #f3f0ea;
  --t1: #1a1814;
  --t2: #4a4640;
  --t3: #8a8278;
  --border: #ddd8cc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--t1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }
.nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(15,14,13,.95); border-bottom: 1px solid var(--border); z-index: 1000; }
.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 60px; display: flex; align-items: center; gap: 12px; width: 100%; box-sizing: border-box; }
.nav-logo { font-size: 18px; font-weight: 800; color: var(--gold); text-decoration: none; }
.nav-menu { flex: 1; position: relative; }
.nav-btn { background: none; border: none; color: var(--t1); cursor: pointer; font-size: 18px; padding: 8px 12px; }
.nav-dropdown { position: absolute; top: 100%; right: 0; background: rgba(26,23,20,.98); border: 1px solid var(--border); border-radius: 8px; min-width: 160px; display: none; z-index: 2000; margin-top: 4px; }
.nav-dropdown.show { display: block; }
.nav-item { display: block; width: 100%; text-align: left; background: none; border: none; padding: 12px 16px; color: var(--t1); cursor: pointer; font-weight: 600; border-bottom: 1px solid var(--border); }
.nav-item:last-child { border-bottom: none; }
.nav-item:hover { background: rgba(201,168,76,.15); color: var(--gold); }
.nav-item.active { color: var(--gold); }
.page { display: none; margin-top: 60px; }
.page.active { display: block; }
.layout { max-width: 1200px; margin: 0 auto; padding: 20px; }
.card-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 768px) { .card-list { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1200px) { .card-list { grid-template-columns: repeat(3, 1fr); } }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all .2s; }
.card:hover { border-color: var(--gold); transform: translateY(-2px); }
.card-rank { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
.card-name { font-size: 16px; font-weight: 700; color: var(--t1); margin-bottom: 4px; }
.card-brand { font-size: 12px; color: var(--t3); margin-bottom: 8px; }
.card-specs { font-size: 12px; color: var(--t2); margin-bottom: 8px; line-height: 1.4; }
.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
.card-score { font-size: 20px; font-weight: 800; color: var(--gold); }
.card-price { font-weight: 700; color: var(--t1); }
.btn { background: var(--gold); color: #0a0804; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
.btn:hover { background: var(--gold-light); }
.filament-section { margin-bottom: 24px; }
.filament-section h3 { color: var(--gold); margin-bottom: 12px; }
.filament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.filament-card { background: var(--bg2); border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
.filament-brand { font-weight: 700; color: var(--t1); margin-bottom: 4px; }
.filament-price { color: var(--gold); font-weight: 600; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="#">3DRanker</a>
    <div class="nav-menu">
      <button class="nav-btn" onclick="toggleMenu()">☰</button>
      <div class="nav-dropdown" id="navMenu">
        <button class="nav-item active" onclick="showPage('rankings'); toggleMenu()">🏆 Rankings</button>
        <button class="nav-item" onclick="showPage('compare'); toggleMenu()">⚖️ Compare</button>
        <button class="nav-item" onclick="showPage('filament'); toggleMenu()">🧵 Filament</button>
      </div>
    </div>
    <button class="nav-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
  </div>
</nav>

<div class="page active" id="pageRankings">
  <div class="layout">
    <h1 style="color: var(--gold); margin-bottom: 20px;">🏆 Best 3D Printers Ranked</h1>
    <div class="card-list" id="rankingsList"></div>
  </div>
</div>

<div class="page" id="pageCompare">
  <div class="layout">
    <h1 style="color: var(--gold); margin-bottom: 20px;">⚖️ Compare Printers</h1>
    <p style="color: var(--t2); margin-bottom: 20px;">Click a printer card to compare specs side-by-side</p>
    <div class="card-list" id="compareList"></div>
  </div>
</div>

<div class="page" id="pageFilament">
  <div class="layout">
    <h1 style="color: var(--gold); margin-bottom: 20px;">🧵 Filament Brands</h1>
    <div id="filamentBrands"></div>
  </div>
</div>

<script>
const PRINTERS = [
{"rank":1,"name":"Bambu Lab H2C","brand":"Bambu Lab","price":2149,"score":8.85,"specs":"330x320x320mm, 350°C, Dual extruder, Enclosed"},
{"rank":2,"name":"Bambu Lab H2S","brand":"Bambu Lab","price":1349,"score":8.81,"specs":"340x320x340mm, 350°C, Single extruder, Enclosed"},
{"rank":3,"name":"Bambu Lab P2S","brand":"Bambu Lab","price":499,"score":8.75,"specs":"256x256x256mm, 300°C, Multi-color, Camera"},
{"rank":4,"name":"Bambu Lab H2D","brand":"Bambu Lab","price":1699,"score":8.72,"specs":"325x320x325mm, 350°C, Dual extruder"},
{"rank":5,"name":"Bambu Lab P1S","brand":"Bambu Lab","price":539,"score":8.62,"specs":"256x256x256mm, 300°C, AI Detection"},
{"rank":6,"name":"Bambu Lab X2D","brand":"Bambu Lab","price":649,"score":8.55,"specs":"256x256x260mm, 300°C, Dual nozzle"},
{"rank":7,"name":"Bambu Lab A2L","brand":"Bambu Lab","price":469,"score":8.35,"specs":"330x320x325mm, 300°C, Open frame"},
{"rank":8,"name":"Prusa MK4S","brand":"Prusa Research","price":999,"score":8.52,"specs":"250x210x220mm, 290°C, Open source"},
{"rank":9,"name":"Prusa Core One L","brand":"Prusa Research","price":1999,"score":8.47,"specs":"350x350x350mm, 290°C, Large format"},
{"rank":10,"name":"Prusa Core One+","brand":"Prusa Research","price":1299,"score":8.43,"specs":"300x300x300mm, 290°C, Enclosed"},
{"rank":11,"name":"Creality K1 Max","brand":"Creality","price":350,"score":8.0,"specs":"300x300x300mm, 300°C, High-speed"},
{"rank":12,"name":"Creality K2 Combo","brand":"Creality","price":599,"score":7.57,"specs":"260x260x260mm, 300°C, Multi-color"},
{"rank":13,"name":"Elegoo Neptune 4 Max","brand":"Elegoo","price":279,"score":7.71,"specs":"320x320x320mm, 260°C, Large build"},
{"rank":14,"name":"Elegoo Centauri Carbon","brand":"Elegoo","price":319,"score":7.56,"specs":"235x235x280mm, 260°C, Enclosed"},
{"rank":15,"name":"Anycubic Kobra 2","brand":"Anycubic","price":259,"score":7.41,"specs":"250x250x260mm, 260°C, Auto-level"},
{"rank":16,"name":"Anycubic Kobra X","brand":"Anycubic","price":399,"score":7.07,"specs":"400x400x400mm, 260°C, Large format"},
{"rank":17,"name":"FlashForge Adventurer 5M Pro","brand":"FlashForge","price":449,"score":8.03,"specs":"245x220x220mm, 260°C, Enclosed"},
{"rank":18,"name":"Snapmaker J1s","brand":"Snapmaker","price":499,"score":7.56,"specs":"230x250x250mm, 260°C, Dual extruder"},
{"rank":19,"name":"Voxelab Aquila S2","brand":"Voxelab","price":189,"score":6.92,"specs":"245x245x260mm, 260°C, Budget"},
{"rank":20,"name":"Raise3D Pro3","brand":"Raise3D","price":3999,"score":7.8,"specs":"300x200x200mm, 300°C, Dual extruder"}
];

const FILAMENTS = {
  "Bambu Lab": [{"material":"PLA","price":"$10.99","spool":"Plastic"},{"material":"PETG","price":"$9.89","spool":"Plastic"},{"material":"ABS","price":"$10.99","spool":"Plastic"}],
  "Prusament": [{"material":"PLA","price":"$29.99","spool":"Cardboard"},{"material":"PETG","price":"$27.99","spool":"Cardboard"}],
  "Overture": [{"material":"PLA","price":"$14.99","spool":"Cardboard"},{"material":"PETG","price":"$14.99","spool":"Cardboard"}],
  "Sunlu": [{"material":"PLA","price":"$9.95","spool":"Cardboard"},{"material":"TPU","price":"$15.99","spool":"Cardboard"}],
  "Hatchbox": [{"material":"PLA","price":"$18.99","spool":"Cardboard"},{"material":"PETG","price":"$19.99","spool":"Cardboard"}]
};

function toggleMenu() {
  const menu = document.getElementById('navMenu');
  menu.classList.toggle('show');
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  event.target.classList.add('active');
}

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
}

// Load theme preference
if (localStorage.getItem('theme') === 'light') {
  document.documentElement.classList.add('light');
}

// Render rankings
function renderRankings() {
  const html = PRINTERS.map(p => `
    <div class="card">
      <div class="card-rank">#${p.rank}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-brand">${p.brand}</div>
      <div class="card-specs">${p.specs}</div>
      <div class="card-footer">
        <div class="card-score">${p.score}</div>
        <div class="card-price">$${p.price}</div>
        <button class="btn">Details</button>
      </div>
    </div>
  `).join('');
  document.getElementById('rankingsList').innerHTML = html;
}

// Render compare
function renderCompare() {
  const html = PRINTERS.map(p => `
    <div class="card" onclick="compareWithPrinter('${p.name}')">
      <div class="card-name">${p.name}</div>
      <div class="card-brand">${p.brand}</div>
      <div class="card-price">$${p.price}</div>
    </div>
  `).join('');
  document.getElementById('compareList').innerHTML = html;
}

// Render filament
function renderFilament() {
  const html = Object.entries(FILAMENTS).map(([brand, materials]) => `
    <div class="filament-section">
      <h3>${brand}</h3>
      <div class="filament-grid">
        ${materials.map(m => `
          <div class="filament-card">
            <div class="filament-brand">${m.material}</div>
            <div class="filament-price">${m.price}</div>
            <div style="font-size: 11px; color: var(--t3);">${m.spool} spool</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('filamentBrands').innerHTML = html;
}

renderRankings();
renderCompare();
renderFilament();
</script>
</body>
</html>
